name: Sync Dados GestãoClick

on:
  schedule:
    - cron: '*/30 * * * *'   # a cada 30 minutos
  workflow_dispatch:           # permite rodar manualmente

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Executar sync
        env:
          GC_ACCESS_TOKEN:        ${{ secrets.GC_ACCESS_TOKEN }}
          GC_SECRET_ACCESS_TOKEN: ${{ secrets.GC_SECRET_ACCESS_TOKEN }}
        run: node scripts/sync-dados.js

      - name: Commit e push dos dados
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/vendas.json data/estoque.json data/financeiro.json
          git diff --staged --quiet || git commit -m "sync: atualiza dados [$(date -u '+%d/%m/%Y %H:%M')] UTC"
          git push
